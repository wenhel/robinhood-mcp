# Release Please - Automated versioning and PyPI publishing
#
# How it works:
# 1. Every push to main with conventional commits updates a "Release PR"
# 2. When you merge the Release PR, it:
#    - Updates version in pyproject.toml, __init__.py, server.json
#    - Updates CHANGELOG.md
#    - Creates a GitHub Release with tag
#    - Triggers the PyPI publish job below
#
# Commit message format:
#   feat: add new feature          → minor version bump
#   fix: fix a bug                 → patch version bump
#   feat!: breaking change         → major version bump
#   chore/docs: no version bump
#
# PyPI Publishing:
#   Uses Trusted Publishing (OIDC) - no PyPI token needed!
#   Configure at: https://pypi.org/manage/project/robinhood-mcp/settings/publishing/
#
# RELEASE_PLEASE_TOKEN:
#   Uses org-level PAT so the Release PR triggers CI workflows.
#   PRs created by GITHUB_TOKEN don't trigger other workflows (GitHub security).

name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          manifest-file: ".release-please-manifest.json"
          config-file: "release-please-config.json"
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  pypi-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
